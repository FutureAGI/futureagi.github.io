# Site settings
title: FutureAGI
SEOTitle: 通用智能 非常识 | AGI non-obvious insights
header-img: img/post-bg-desk.jpg
email: fanwang.px@gmail.com
description: "Sharing some non-common sense insights on AGI."
keyword: "AGI, Artificial General Intelligence, 通用智能, 人工智能, AI"
url: "http://futureagi.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'

# Sidebar settings
